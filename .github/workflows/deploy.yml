# Quikkred Landing & Dashboard CI/CD Pipeline
# Last updated: 2026-01-26 - Deploy on push to main + scheduled at 12 AM IST


name: Quikkred Landing & Dashboard CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: false
        default: "staging"
        type: choice
        options:
          - staging
          - production
      deploy_now:
        description: "Deploy to production immediately (skip schedule)"
        required: false
        default: false
        type: boolean








  schedule:
    # 12:00 AM IST = 18:30 UTC (previous day)
    - cron: '30 18 * * *'
  push:
    branches:
      - develop    # Deploy to Alpha (Hostinger KVM8)
      - staging    # Deploy to Beta (AWS ECS)
      - main       # Deploy to Production (AWS ECS)
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches:
      - develop
      - staging
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  AWS_REGION: ap-south-1
  NODE_VERSION: '20'
  ECR_REPOSITORY: quikkred-landing

jobs:
  # ============================================
  # BUILD & TEST (All branches)
  # ============================================
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Run linter
        run: npm run lint
        continue-on-error: true

      # Fast type-safety gate instead of a full `next build` — the production
      # build is re-done inside Docker (ECS) / on the server (alpha, vultr), so
      # building here too just doubled the time. tsc catches type errors quickly.
      - name: Type check
        run: npx tsc --noEmit

  # ============================================
  # DEPLOY TO ALPHA (Hostinger KVM8)
  # Triggers on: push to develop
  # ============================================
  deploy-alpha:
    needs: build-and-test
    if: github.ref == 'refs/heads/develop' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    runs-on: ubuntu-latest
    environment: alpha

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Hostinger Alpha
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 93.127.167.88
          username: root
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: 22
          script: |
            echo "🚀 Starting Alpha Landing Page deployment..."

            cd /opt/quikkred/landing || { echo "❌ Directory not found"; exit 1; }

            git fetch origin develop
            git reset --hard origin/develop

            # Only reinstall deps when the lockfile changed (saves a full npm ci).
            if ! cmp -s package-lock.json /tmp/quikkred-landing-lock.alpha 2>/dev/null; then
              npm ci --prefer-offline --no-audit --no-fund
              cp package-lock.json /tmp/quikkred-landing-lock.alpha
            else
              echo "package-lock.json unchanged — skipping npm ci"
            fi

            NEXT_PUBLIC_API_URL=https://alpha.quikkred.in npm run build

            pm2 delete quikkred-landing 2>/dev/null || true
            PORT=3002 pm2 start npm --name "quikkred-landing" -- start
            pm2 save

            echo "✅ Alpha Landing Page deployment complete!"

      - name: Health Check
        run: |
          sleep 15
          response=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 https://alpha.quikkred.in || echo "000")
          echo "Alpha health check: $response"

  # ============================================
  # DEPLOY TO BETA (AWS ECS)
  # Triggers on: push to staging
  # ============================================
  deploy-beta:
    needs: build-and-test
    if: github.ref == 'refs/heads/staging' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    runs-on: ubuntu-latest
    environment: beta

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Use beta environment config
        run: |
          cp .env.beta .env.production
          echo "✅ Using .env.beta for beta build"

      - name: Build, tag, and push image to ECR
        id: build-image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://beta.quikkred.in
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:beta-${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:beta-latest
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:beta-buildcache
          cache-to: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:beta-buildcache,mode=max

      - name: Update ECS Task Definition
        id: task-def
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: beta-${{ github.sha }}
        run: |
          TASK_FAMILY="quikkred-landing-beta"

          aws ecs describe-task-definition --task-definition $TASK_FAMILY \
            --query 'taskDefinition' > task-def.json

          NEW_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

          cat task-def.json | jq --arg IMG "$NEW_IMAGE" \
            'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy) | .containerDefinitions[0].image = $IMG' \
            > new-task-def.json

          NEW_TASK_DEF=$(aws ecs register-task-definition \
            --cli-input-json file://new-task-def.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "task-def-arn=$NEW_TASK_DEF" >> $GITHUB_OUTPUT
          echo "✅ New task definition registered: $NEW_TASK_DEF"


























      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster quikkred-beta \
            --service quikkred-landing-beta \
            --task-definition ${{ steps.task-def.outputs.task-def-arn }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          echo "✅ ECS Beta service updated"

      - name: Wait for deployment
        run: |
          echo "Waiting for ECS deployment to stabilize..."
          aws ecs wait services-stable \
            --cluster quikkred-beta \
            --services quikkred-landing-beta \
            --region ${{ env.AWS_REGION }} || true

      - name: Health Check
        run: |
          sleep 15
          response=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 https://beta.quikkred.in || echo "000")

          echo "Beta health check: $response"

  # ============================================
  # DEPLOY TO PRODUCTION (AWS ECS)
  # Triggers on: push to main, schedule (12 AM IST), or manual workflow_dispatch

  # ============================================
  deploy-production:
    needs: build-and-test






    if: |
      github.ref == 'refs/heads/main' && (
        github.event_name == 'push' ||
        github.event_name == 'schedule' ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_now == 'true')
      )
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, tag, and push image to ECR
        id: build-image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.quikkred.in
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:prod-${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:prod-buildcache
          cache-to: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:prod-buildcache,mode=max

      - name: Update ECS Task Definition
        id: task-def
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: prod-${{ github.sha }}
        run: |
          TASK_FAMILY="quikkred-landing-prod"

          aws ecs describe-task-definition --task-definition $TASK_FAMILY \
            --query 'taskDefinition' > task-def.json

          NEW_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

          cat task-def.json | jq --arg IMG "$NEW_IMAGE" \
            'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy) | .containerDefinitions[0].image = $IMG' \
            > new-task-def.json

          NEW_TASK_DEF=$(aws ecs register-task-definition \
            --cli-input-json file://new-task-def.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "task-def-arn=$NEW_TASK_DEF" >> $GITHUB_OUTPUT
          echo "✅ New task definition registered: $NEW_TASK_DEF"


























      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster quikkred-production \
            --service quikkred-landing-service \
            --task-definition ${{ steps.task-def.outputs.task-def-arn }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          echo "✅ ECS Production service updated"

      - name: Wait for deployment
        run: |
          echo "Waiting for ECS deployment to stabilize..."
          aws ecs wait services-stable \
            --cluster quikkred-production \
            --services quikkred-landing-service \
            --region ${{ env.AWS_REGION }} || true

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
          echo "✅ CloudFront cache invalidated"








      - name: Health Check
        run: |
          sleep 15
          response=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 https://quikkred.in || echo "000")
          echo "Production health check: $response"

      - name: Notify Team
        if: always()
        continue-on-error: true
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: '🚀 PRODUCTION Landing Page Deployment: ${{ job.status }}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}