name: Deploy Quikkred Landing

on:
  push:
    branches:
      - develop    # Deploy to Alpha
      - staging    # Deploy to Beta

jobs:
  deploy-alpha:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Alpha
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: alpha.quikkred.in
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/app/quikkred-landing
            git fetch origin develop
            git reset --hard origin/develop
            npm install
            npm run build
            pm2 restart quikkred-landing || pm2 start npm --name quikkred-landing -- start -- -p 3002

  deploy-beta:
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Beta
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: beta.quikkred.in
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/app/quikkred-landing
            git fetch origin staging
            git reset --hard origin/staging
            npm install
            npm run build
            pm2 restart quikkred-landing || pm2 start npm --name quikkred-landing -- start -- -p 3002
